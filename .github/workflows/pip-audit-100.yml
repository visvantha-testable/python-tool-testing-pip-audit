name: Pip Audit 100 Percent

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify-100:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run 100% training pipeline
        run: |
          pip install -r requirements.txt
          pwsh ./run_pip_audit_analysis.ps1
      - name: Verify metric coverage
        run: python validate_metric_coverage.py --metrics-json pip_audit_metrics.json
